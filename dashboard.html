<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Veridian — Customer 360 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#A2AE9D;--sage-l:#c8d1c4;--sage-d:#6a7a66;--sage-bg:#f0f3ef;
  --crimson:#9B1313;--crimson-l:#f5e8e8;--crimson-d:#7a0e0e;
  --navy:#272757;--navy-d:#1a1a3e;--navy-l:#3a3a72;--navy-bg:#eeeef6;
  --white:#fff;--bg:#f7f6f3;
  --text:#1a1a2e;--muted:#8a8a9a;--light:#b5b5c5;
  --border:#e8e6e2;--sw:240px;
  --green:#3a7a3a;--amber:#e09000;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
.app{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sb{width:var(--sw);flex-shrink:0;background:var(--navy-d);display:flex;flex-direction:column;position:relative;overflow:hidden}
.sb::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at -20% 100%,rgba(155,19,19,.2) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 120% 0%,rgba(162,174,157,.1) 0%,transparent 55%);pointer-events:none}
.sb-brand{padding:1.375rem 1.25rem .875rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);position:relative;z-index:1}
.lmk{width:34px;height:34px;background:var(--sage);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
.lmk::before{content:'';position:absolute;width:17px;height:17px;border-radius:50%;border:2px solid var(--navy);top:50%;left:50%;transform:translate(-50%,-50%)}
.lmk::after{content:'';position:absolute;width:8px;height:8px;background:var(--navy);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.bname{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#fff;letter-spacing:.06em}
.ns{padding:.625rem 1rem;position:relative;z-index:1;overflow-y:auto;flex:1}
.nl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin-bottom:.4rem;padding:0 .25rem}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;transition:.15s;margin-bottom:2px;border:1px solid transparent;position:relative;user-select:none}
.ni:hover{color:#fff;background:rgba(255,255,255,.06)}
.ni.act{color:#fff;background:rgba(255,255,255,.1);border-color:rgba(162,174,157,.2)}
.ni.act .nic{color:var(--sage-l)}
.nic{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nbadge{margin-left:auto;background:var(--crimson);color:#fff;font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px}
.sb-foot{padding:.875rem 1.25rem;border-top:1px solid rgba(255,255,255,.07);position:relative;z-index:1}
.ucard{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:.15s}
.ucard:hover{background:rgba(255,255,255,.06)}
.uav{width:32px;height:32px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--navy);flex-shrink:0}
.uname{font-size:12px;font-weight:500;color:#fff;line-height:1.2}
.urole{font-size:11px;color:rgba(255,255,255,.32)}
.logout-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.28);padding:4px;transition:.15s}
.logout-btn:hover{color:var(--crimson)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--navy)}
.sw{flex:1;max-width:360px;margin-left:auto;position:relative}
.sw input{width:100%;padding:8px 14px 8px 34px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:.2s}
.sw input:focus{border-color:var(--sage);background:#fff;box-shadow:0 0 0 3px rgba(162,174,157,.12)}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--light)}
.tb-acts{display:flex;align-items:center;gap:8px}
.ibtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.15s;position:relative}
.ibtn:hover{background:var(--bg);color:var(--navy)}
.ndot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--crimson);border:1.5px solid #fff}

/* ── CONTENT ── */
.content{padding:1.5rem;flex:1}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem 1.125rem;transition:.2s;cursor:default;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px;background:var(--navy);opacity:0;transition:.2s}
.kpi:hover{box-shadow:0 2px 14px rgba(39,39,87,.07);transform:translateY(-1px)}
.kpi:hover::after{opacity:1}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--light);margin-bottom:4px}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--navy);line-height:1.1;margin-bottom:4px}
.kpi-delta{font-size:11px;display:flex;align-items:center;gap:3px}
.up{color:var(--green)}.dn{color:var(--crimson)}.nt{color:var(--light)}

/* ── CUSTOMER HEADER ── */
.cust-hd{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.125rem 1.25rem;display:flex;align-items:center;gap:1.25rem;margin-bottom:1.5rem}
.cav{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:#fff;flex-shrink:0}
.cname{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--navy);margin-bottom:5px}
.ctags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.t-kyc{background:rgba(58,122,58,.1);color:var(--green);border:1px solid rgba(58,122,58,.2)}
.t-seg{background:var(--navy-bg);color:var(--navy);border:1px solid rgba(39,39,87,.15)}
.t-low{background:rgba(162,174,157,.15);color:var(--sage-d);border:1px solid rgba(162,174,157,.3)}
.t-med{background:rgba(200,160,40,.1);color:#9a7800;border:1px solid rgba(200,160,40,.2)}
.cstats{display:flex;gap:1.5rem;margin-left:auto}
.cstat .val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--navy);line-height:1}
.cstat .lbl{font-size:10px;color:var(--light);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.cust-sel{display:flex;align-items:center;gap:8px;margin-left:auto}
.cust-sel select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--navy);background:#fff;outline:none;cursor:pointer}

/* ── TWO COL LAYOUT ── */
.two{display:grid;grid-template-columns:1fr 330px;gap:14px;margin-bottom:1.5rem}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.card:last-child{margin-bottom:0}
.ch{padding:.875rem 1.125rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:500;color:var(--navy);text-transform:uppercase;letter-spacing:.07em}
.va{font-size:12px;color:var(--sage-d);cursor:pointer;transition:.15s}
.va:hover{color:var(--crimson)}
.cb{padding:.875rem 1.125rem}

/* ── TABS ── */
.tab-row{display:flex;gap:4px;padding:.625rem .875rem;border-bottom:1px solid var(--border);background:#fafafa}
.tab-btn{padding:5px 14px;border-radius:6px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:.15s}
.tab-btn:hover{background:var(--bg)}
.tab-btn.act{background:var(--navy);color:#fff}
.tab-pane{display:none;padding:.875rem 1.125rem}
.tab-pane.act{display:block}

/* ── PRODUCTS ── */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcard{padding:.875rem;border:1px solid var(--border);border-radius:10px;transition:.15s;cursor:pointer;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--navy);transform:scaleX(0);transform-origin:left;transition:.2s}
.pcard:hover{border-color:var(--sage);background:var(--sage-bg)}
.pcard:hover::before{transform:scaleX(1)}
.pt{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pn{font-size:13px;font-weight:500;color:var(--navy);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pnum{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:5px}
.pbal{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--navy)}
.pmeta{font-size:11px;color:var(--light);margin-top:1px}

/* ── TIMELINE ── */
.tl-item{display:flex;gap:11px;padding:.875rem 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.tl-item:last-child{border-bottom:none}
.tl-item:hover .tl-title{color:var(--crimson)}
.tlic{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ic-call{background:var(--navy-bg)}.ic-comp{background:var(--crimson-l)}.ic-branch{background:var(--sage-bg)}.ic-digi{background:rgba(60,130,200,.08)}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:13px;font-weight:500;color:var(--navy);margin-bottom:2px;transition:.15s}
.tl-desc{font-size:12px;color:var(--muted);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-time{font-size:11px;color:var(--light);flex-shrink:0;margin-left:auto;padding-left:8px}

/* ── NOTE FORM ── */
.note-form textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;resize:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:.2s;min-height:76px}
.note-form textarea:focus{border-color:var(--sage);background:#fff;box-shadow:0 0 0 3px rgba(162,174,157,.1)}
.nfrow{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;align-items:center}
.ntag{padding:5px 12px;border-radius:99px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:#fff;color:var(--muted);transition:.15s;font-family:'DM Sans',sans-serif}
.ntag:hover,.ntag.act{background:var(--navy);color:#fff;border-color:var(--navy)}
.nsave{margin-left:auto;padding:7px 16px;border-radius:8px;background:var(--navy);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.15s}
.nsave:hover{background:var(--navy-l)}

/* ── NBA ── */
.nba-card{background:linear-gradient(135deg,var(--navy-d) 0%,#3a3a72 100%);border-radius:10px;padding:1rem;margin-bottom:8px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.nba-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 100% 0%,rgba(162,174,157,.1),transparent 60%)}
.nba-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(39,39,87,.22)}
.nba-score{position:absolute;top:.875rem;right:.875rem;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--sage-l);line-height:1}
.nba-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--sage-l);margin-bottom:6px;opacity:.7}
.nba-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:#fff;margin-bottom:4px}
.nba-why{font-size:11px;color:rgba(255,255,255,.48);line-height:1.4}

/* ── SERVICE REQUESTS ── */
.sr-item{display:flex;align-items:center;gap:10px;padding:.875rem 0;border-bottom:1px solid var(--border)}
.sr-item:last-child{border-bottom:none}
.srdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-open{background:var(--amber)}.d-prog{background:var(--green)}.d-esc{background:var(--crimson)}.d-close{background:var(--light)}
.sr-title{font-size:13px;font-weight:500;color:var(--navy);flex:1}
.sr-sub{font-size:11px;color:var(--light)}
.sr-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;flex-shrink:0}
.tg-open{background:rgba(224,144,0,.1);color:#9a6000}
.tg-prog{background:rgba(58,122,58,.1);color:var(--green)}
.tg-esc{background:var(--crimson-l);color:var(--crimson)}
.tg-close{background:rgba(0,0,0,.05);color:var(--muted)}

/* ── CHART ── */
.chart-wrap{display:flex;align-items:flex-end;gap:5px;height:90px;padding:6px 0 2px}
.bwrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.bar{width:100%;border-radius:4px 4px 0 0;background:var(--navy-bg);transition:background .2s}
.bar.hi{background:var(--navy)}
.blbl{font-size:9px;color:var(--light)}
.bval{font-size:9px;font-weight:500;color:var(--muted)}

/* ── ACTIVITY ── */
.feed-item{display:flex;gap:10px;padding:.75rem 0;border-bottom:1px solid var(--border)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);margin-top:4px;flex-shrink:0}
.feed-text{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.feed-text strong{color:var(--navy);font-weight:500}
.feed-time{font-size:10px;color:var(--light);flex-shrink:0}

/* ── PULSE ── */
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);position:relative;margin-right:5px}
.pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(58,122,58,.3);animation:pulseAnim 2s ease infinite}
@keyframes pulseAnim{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.4}}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy-d);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none;z-index:999;max-width:300px;line-height:1.4}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-left:3px solid var(--sage)}
.toast.err{border-left:3px solid var(--crimson)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:500px;max-height:80vh;overflow-y:auto;padding:1.5rem;animation:fup .2s ease}
@keyframes fup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--navy);margin-bottom:1rem}
.form-group{margin-bottom:.875rem}
.form-label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;background:#fff;transition:.2s}
.form-input:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(162,174,157,.12)}
.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;cursor:pointer}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn{padding:8px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-l)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{background:var(--bg)}

/* ── SERVICE REQUEST FORM ── */
.sr-form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}


/* ── ANIMATED BLOBS ── */
#blob-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;opacity:0.40;}


/* ── SR CLICKABLE ── */
.sr-item{cursor:pointer;border-radius:8px;padding:.875rem 6px;transition:.15s;}
.sr-item:hover{background:var(--sage-bg);}

/* ── SCROLLBAR ── */
.main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-track{background:transparent}.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ns::-webkit-scrollbar{width:3px}.ns::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}

@media(max-width:1100px){.two{grid-template-columns:1fr}}
@media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.sb{display:none}.kpi-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="blob-canvas"></canvas>

<div class="app">
<!-- SIDEBAR -->
<nav class="sb">
  <div class="sb-brand">
    <div class="lmk"></div>
    <span class="bname">Veridian</span>
  </div>
  <div class="ns">
    <div class="nl">Workspace</div>
    <div class="ni act" data-view="dashboard">
      <svg class="nic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
    </div>
    <div class="ni" data-view="customers">
      <svg class="nic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Customers
    </div>
    <div class="ni" data-view="products">
      <svg class="nic" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Products
    </div>
    <div class="ni" data-view="service">
      <svg class="nic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Service Requests<span class="nbadge" id="srCount">3</span>
    </div>
    <div class="nl" style="margin-top:.75rem">Intelligence</div>
    <div class="ni" data-view="nba">
      <svg class="nic" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>NBA Engine
    </div>
    <div class="ni" data-view="analytics">
      <svg class="nic" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics
    </div>
    <div class="nl" style="margin-top:.75rem">System</div>
    <div class="ni" data-view="admin" id="adminNavItem">

<script>
// ─── DB & SESSION ────────────────────────────────────────
const DB_KEY = 'v360_db', SESSION_KEY = 'v360_session', TTL = 7*24*60*60*1000;

function getDB() {
  try {
    const d = JSON.parse(localStorage.getItem(DB_KEY));
    if (d && d.expiry && Date.now() < d.expiry) return d;
  } catch(e) {}
  return null;
}
function saveDB(db) { db.expiry = Date.now() + TTL; localStorage.setItem(DB_KEY, JSON.stringify(db)); }

const db = getDB();
let session;
try {
  session = JSON.parse(localStorage.getItem(SESSION_KEY));
  if (!session || !session.expiry || Date.now() >= session.expiry) throw new Error();
} catch(e) { window.location.href = 'index.html'; }

// ─── CUSTOMERS DATA ──────────────────────────────────────
const CUSTOMERS = [
  { id:'c1', name:'Ramesh Kumar Venkataraman', cif:'CIF-2024-8812', segment:'HNI', kyc:'Complete', risk:'Low', tenure:'6 years', rm:'Fathima Q.', mobile:'+91 98765 43210', email:'ramesh.k@gmail.com', pan:'ABCDE1234F', aadhaar:'**** **** 7741', dob:'14 March 1978', address:'42, Jubilee Hills, Hyderabad — 500033', nominee:'Priya Kumar (Spouse)', aum:'₹48.3L', products:7, nba:87 },
  { id:'c2', name:'Sunita Rao Krishnamurthy', cif:'CIF-2023-4421', segment:'Retail', kyc:'Pending', risk:'Medium', tenure:'3 years', rm:'Datla M.', mobile:'+91 87654 32109', email:'sunita.rao@outlook.com', pan:'FGHIJ5678K', aadhaar:'**** **** 3310', dob:'22 July 1985', address:'15, Banjara Hills, Hyderabad — 500034', nominee:'Rajesh Rao (Husband)', aum:'₹12.7L', products:4, nba:72 },
  { id:'c3', name:'Vikram Singh Chauhan', cif:'CIF-2022-1199', segment:'SME', kyc:'Complete', risk:'High', tenure:'8 years', rm:'Ravi K.', mobile:'+91 99887 76655', email:'vikram.singh@biz.in', pan:'LMNOP9012Q', aadhaar:'**** **** 9921', dob:'05 Jan 1972', address:'Plot 88, Cyberabad, Hyderabad — 500081', nominee:'Anita Singh (Spouse)', aum:'₹95.2L', products:9, nba:91 },
];

let activeCIF = 'c1';
let currentView = 'dashboard';
let activeNoteTag = 'Follow-up';
let toastTmr;

function getCustomer() { return CUSTOMERS.find(c => c.id === activeCIF) || CUSTOMERS[0]; }

function getServiceRequests() {
  const d = getDB();
  return (d && d.serviceRequests) ? d.serviceRequests.filter(s => s.cif === activeCIF) : getDefaultSR();
}

function getDefaultSR() {
  return [
    {id:'SR-2024-0481', title:'Forex charge dispute', status:'Escalated', date:'Today', cif:'c1'},
    {id:'SR-2024-0463', title:'Locker key renewal', status:'In Progress', date:'4 days ago', cif:'c1'},
    {id:'SR-2024-0440', title:'Statement FY 2023-24', status:'Pending', date:'1 week ago', cif:'c1'},
    {id:'SR-2023-0311', title:'Cheque book request', status:'Resolved', date:'2 months ago', cif:'c2'},
    {id:'SR-2024-0510', title:'KYC document update', status:'In Progress', date:'2 days ago', cif:'c2'},
    {id:'SR-2024-0522', title:'Business loan query', status:'Pending', date:'3 days ago', cif:'c3'},
    {id:'SR-2024-0498', title:'FD premature closure', status:'Escalated', date:'1 week ago', cif:'c3'},
  ];
}

function getNotes() {
  const d = getDB();
  return (d && d.notes) ? d.notes.filter(n => n.cif === activeCIF) : [];
}

function saveNote(text, tag) {
  const d = getDB() || {};
  if (!d.notes) d.notes = [];
  d.notes.unshift({id:'note'+Date.now(), cif: activeCIF, text, tag, ts: new Date().toLocaleString(), rm: session.name});
  saveDB(d);
}

function saveSR(sr) {
  const d = getDB() || {};
  if (!d.serviceRequests) d.serviceRequests = getDefaultSR();
  d.serviceRequests.unshift(sr);
  saveDB(d);
}

// ─── INIT ────────────────────────────────────────────────
document.getElementById('uav').textContent = session.initials || session.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
document.getElementById('unameEl').textContent = session.name;
document.getElementById('uroleEl').textContent = {rm:'Relationship Manager', admin:'Administrator', supervisor:'Supervisor'}[session.role] || session.role;
if (session.role !== 'admin') document.getElementById('adminNavItem').style.display = 'none';

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem(SESSION_KEY);
  toast('Signed out. See you soon!', 'ok');

});

// ─── NAVIGATION ──────────────────────────────────────────
document.querySelectorAll('.ni').forEach(n => {
  n.addEventListener('click', () => {
    const v = n.dataset.view;
    if (v === 'admin') { window.location.href = 'admin.html'; return; }
    document.querySelectorAll('.ni').forEach(x => x.classList.remove('act'));
    n.classList.add('act');
    currentView = v;
    render();

});

document.getElementById('exportBtn').addEventListener('click', () => toast(`Generating PDF export for ${getCustomer().name}…`, 'ok'));

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const c = getCustomer();
  const titles = {dashboard:'Customer 360 View', customers:'Customer Directory', products:'Products Held', service:'Service Requests', nba:'NBA Engine', analytics:'Analytics', admin:'Admin Panel'};
  document.getElementById('pageTitle').textContent = titles[currentView] || 'Veridian';
  const el = document.getElementById('contentEl');
  if (currentView === 'dashboard') el.innerHTML = renderDashboard(c);
  else if (currentView === 'customers') el.innerHTML = renderCustomers();
  else if (currentView === 'products') el.innerHTML = renderProducts(c);
  else if (currentView === 'service') el.innerHTML = renderServicePage(c);
  else if (currentView === 'nba') el.innerHTML = renderNBAPage(c);
  else if (currentView === 'analytics') el.innerHTML = renderAnalytics(c);
  else el.innerHTML = `<div style="text-align:center;padding:4rem;color:var(--muted)">View not available in this context.</div>`;
  attachContentEvents();
}

function renderDashboard(c) {

          <button class="tab-btn" onclick="switchTab(this,'history')">History</button>

// ─── EVENTS ──────────────────────────────────────────────
function attachContentEvents() {
  const sel = document.getElementById('custSelector');
  if (sel) sel.addEventListener('change', function(){ activeCIF = this.value; render(); });
  renderBarChart();
}

function renderBarChart() {
  const wrap = document.getElementById('chartWrap');
  if (!wrap) return;
  const months=['Nov','Dec','Jan','Feb','Mar','Apr','May'], vals=[42,68,55,81,63,90,74], max=Math.max(...vals);
  wrap.innerHTML = '';
  months.forEach((m,i) => {
    const h = Math.round((vals[i]/max)*76), isMax = vals[i]===max;
    const bw=document.createElement('div'); bw.className='bwrap';
    const bv=document.createElement('div'); bv.className='bval'; bv.textContent=vals[i]+'k';
    const bar=document.createElement('div'); bar.className='bar'+(isMax?' hi':''); bar.style.height=h+'px';
    const bl=document.createElement('div'); bl.className='blbl'; bl.textContent=m;
    bar.addEventListener('click',()=>toast(`${m}: ₹${vals[i]},000 in transactions`,'ok'));
    bar.addEventListener('mouseenter',()=>bar.style.background='var(--navy)');
    bar.addEventListener('mouseleave',()=>bar.style.background=isMax?'var(--navy)':'var(--navy-bg)');
    bw.appendChild(bv); bw.appendChild(bar); bw.appendChild(bl); wrap.appendChild(bw);
  });
}

function switchTab(btn, pane) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('act'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById('pane-'+pane)?.classList.add('act');
}

function selectNoteTag(btn, tag) {
  document.querySelectorAll('.ntag').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act'); activeNoteTag = tag;
}

function doSaveNote() {
  const txt = document.getElementById('noteArea')?.value.trim();
  if (!txt) { toast('Please write something before saving.', 'err'); return; }
  saveNote(txt, activeNoteTag);
  toast(`Note [${activeNoteTag}] saved and added to interaction log.`, 'ok');
  document.getElementById('noteArea').value='';
  render();
}

function openSRModal() {
  document.getElementById('srModal').classList.add('show');
}
document.getElementById('srCancel').addEventListener('click', () => document.getElementById('srModal').classList.remove('show'));
document.getElementById('srModal').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('show'); });
document.getElementById('srSubmit').addEventListener('click', () => {
  const type = document.getElementById('srType').value;
  const desc = document.getElementById('srDesc').value.trim();
  const priority = document.getElementById('srPriority').value;
  const channel = document.getElementById('srChannel').value;
  if (!desc) { toast('Please describe the request.', 'err'); return; }
  const sr = {id:'SR-'+Date.now().toString().slice(-7), title:type, desc, priority, channel, status:'Pending', date:'Just now', cif: activeCIF};
  saveSR(sr);
  document.getElementById('srModal').classList.remove('show');
  document.getElementById('srDesc').value='';
  toast(`Service request ${sr.id} raised successfully.`, 'ok');
  if (currentView === 'service') render();
  // update badge
  const d = getDB();
  const cnt = d && d.serviceRequests ? d.serviceRequests.filter(s=>s.status!=='Resolved').length : 3;
  const badge = document.getElementById('srCount');
  if (badge) badge.textContent = cnt;
});

// ─── TOAST ───────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toastEl');
  el.textContent=msg; el.className='toast '+(type||'ok')+' show';
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>el.className='toast', 3200);
}

function openSRDetail(srId, title, status) {
  const extra = SR_EXTRA[srId] || {};
  const statusMap={'Escalated':'tg-esc','In Progress':'tg-prog','Pending':'tg-open','Resolved':'tg-close'};
  const tagCls = statusMap[status] || 'tg-open';
  document.getElementById('srDetailTitle').textContent = extra.type || title;
  document.getElementById('srDetailId').textContent = srId;
  document.getElementById('srDetailStatus').innerHTML = `<span class="sr-tag ${tagCls}" style="font-size:12px;padding:3px 12px">${status}</span>`;
  const meta = [
    ['Priority', extra.priority||'Normal'],
    ['Channel', extra.channel||'—'],
    ['Assigned To', extra.assignedTo||'—'],
    ['SLA', extra.sla||'—'],
    ['Created', extra.created||'—'],
    ['Last Updated', extra.lastUpdated||'—'],
  ];
  const histHtml = (extra.history||[]).map(h=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)"><span style="color:var(--sage-d);flex-shrink:0">&#8250;</span>${h}</div>`).join('');
  document.getElementById('srDetailBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;background:var(--bg);border-radius:8px;padding:.875rem;margin-bottom:1rem">
      ${meta.map(([k,v])=>`<div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--light);margin-bottom:2px">${k}</div><div style="font-size:13px;font-weight:500;color:var(--navy)">${v}</div></div>`).join('')}
    </div>
    <div style="margin-bottom:1rem">
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:6px">Description</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6;background:#fff;border:1px solid var(--border);border-radius:8px;padding:.875rem">${extra.desc||'No description available.'}</div>
    </div>
    ${extra.resolution?`<div style="margin-bottom:1rem"><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:6px">Resolution / Next Steps</div><div style="font-size:13px;color:var(--text);line-height:1.6;background:rgba(162,174,157,.1);border:1px solid rgba(162,174,157,.25);border-radius:8px;padding:.875rem">${extra.resolution}</div></div>`:''}
    ${histHtml?`<div><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin-bottom:6px">Activity Timeline</div>${histHtml}</div>`:''}
  `;
  document.getElementById('srDetailModal').classList.add('show');
}

// ── ANIMATED BLOB BACKGROUND ───────────────────────────
(function(){
  const canvas=document.getElementById('blob-canvas');
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const blobs=[
    {x:0.1, y:0.15,r:0.30,vx:0.00015,vy:0.00011,color:'rgba(39,39,87,0.28)'},
    {x:0.80,y:0.60,r:0.26,vx:-0.00013,vy:0.00015,color:'rgba(162,174,157,0.22)'},
    {x:0.5, y:0.90,r:0.20,vx:0.00018,vy:-0.00009,color:'rgba(155,19,19,0.18)'},
    {x:0.90,y:0.10,r:0.22,vx:-0.00014,vy:0.00013,color:'rgba(39,39,87,0.16)'},
    {x:0.30,y:0.50,r:0.16,vx:0.00010,vy:-0.00016,color:'rgba(162,174,157,0.16)'},
    {x:0.60,y:0.25,r:0.18,vx:-0.00009,vy:0.00018,color:'rgba(155,19,19,0.12)'},
  ];
  let t=0;
  function draw(){
    t++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    blobs.forEach((b,i)=>{
      b.x+=b.vx*(1+0.3*Math.sin(t*0.002+i));
      b.y+=b.vy*(1+0.3*Math.cos(t*0.002+i*1.3));
      if(b.x<-0.1)b.vx=Math.abs(b.vx);
      if(b.x>1.1) b.vx=-Math.abs(b.vx);
      if(b.y<-0.1)b.vy=Math.abs(b.vy);
      if(b.y>1.1) b.vy=-Math.abs(b.vy);
      const cx=b.x*canvas.width,cy=b.y*canvas.height;
      const rx=b.r*canvas.width*(1+0.08*Math.sin(t*0.003+i));
      const ry=b.r*canvas.height*(1+0.08*Math.cos(t*0.003+i*0.7));
      const maxR=Math.max(rx,ry);
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
      grad.addColorStop(0,b.color);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.save();
      ctx.scale(rx/maxR,ry/maxR);
      ctx.beginPath();
      ctx.arc(cx*(maxR/rx),cy*(maxR/ry),maxR,0,Math.PI*2);
      ctx.fillStyle=grad;
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
